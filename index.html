<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>∇ Nabla Store - المتجر الرقمي</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- ملفات البيانات -->
    <script src="products-data.js"></script>
    <script src="3d-background.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold-dark: #B8860B;
            --gold-light: #D4AF37;
            --charcoal: #1A1A1A;
            --charcoal-light: #2D2D2D;
            --text-light: #F0F0F0;
            --text-gray: #AAAAAA;
            --success: #2ecc71;
            --danger: #e74c3c;
            --card-bg: rgba(22, 22, 22, 0.9);
            --card-border: rgba(212, 175, 55, 0.2);
            --gradient-gold: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
        }

        body {
            font-family: 'Exo 2', 'Almarai', sans-serif;
            background: var(--charcoal);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== 3D CANVAS ===== */
        #canvas-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== LAYOUT ===== */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== HEADER ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
            padding: 12px 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo img {
            height: 45px;
            width: auto;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            transition: all 0.3s ease;
        }

        .logo:hover img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8));
        }

        .logo span {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .logo span {
                display: none;
            }
        }

        /* ===== DESKTOP USER INFO ===== */
        .desktop-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(212, 175, 55, 0.1);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--card-border);
        }

        .user-info i {
            color: var(--gold-light);
            font-size: 1.2rem;
        }

        .user-info .user-name {
            color: var(--gold-light);
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        .login-btn {
            background: var(--gradient-gold);
            color: var(--charcoal);
            border: none;
            padding: 8px 25px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        /* ===== FILTERS TOGGLE ===== */
        .filters-toggle {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 12px 25px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filters-toggle:hover {
            border-color: var(--gold-light);
            background: rgba(212, 175, 55, 0.1);
        }

        .filters-toggle-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold-light);
            font-weight: 600;
        }

        .filters-toggle-right i {
            transition: transform 0.3s ease;
            color: var(--gold-light);
        }

        .filters-toggle.active .filters-toggle-right i {
            transform: rotate(180deg);
        }

        /* ===== FILTERS PANEL ===== */
        .filters-panel {
            background: rgba(26, 26, 26, 0.98);
            backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 0;
            margin-bottom: 25px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }

        .filters-panel.active {
            max-height: 500px;
            padding: 25px;
            opacity: 1;
            border-color: var(--gold-light);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            color: var(--text-gray);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .filter-label i {
            color: var(--gold-light);
        }

        .filter-select {
            background: #000000;  /* خلفية سوداء صلبة */
            border: 1px solid var(--gold-light);  /* حد ذهبي */
            border-radius: 15px;
            padding: 12px 15px;
            color: var(--gold-light);  /* نص ذهبي */
            font-family: inherit;
            cursor: pointer;
            outline: none;
            font-weight: 500;
        }

        /* تنسيق الخيارات داخل القائمة المنسدلة */
        .filter-select option {
            background: #000000;  /* خلفية سوداء للخيارات */
            color: var(--gold-light);  /* نص ذهبي */
            padding: 10px;
        }

        /* تغيير لون القائمة المنسدلة عند الفتح (لمتصفح Chrome) */
        .filter-select:focus {
            background: #000000;
            border-color: var(--gold-light);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
        }

        /* لل hover */
        .filter-select:hover {
            background: #111111;  /* أسود مائل للرمادي قليلاً */
            border-color: var(--gold-light);
        }

        .filter-select:hover,
        .filter-select:focus {
            border-color: var(--gold-light);
        }

        .price-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .price-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 12px;
            color: var(--text-light);
            width: 100%;
            text-align: center;
            outline: none;
        }

        .price-input:focus {
            border-color: var(--gold-light);
        }

        .filter-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }

                /* ===== BOOKING BUTTON ANIMATION ===== */
        .submit-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .submit-btn.loading i {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* تأثير إضافي للنص أثناء التحميل */
        .submit-btn.loading span {
            opacity: 0.7;
        }

        /* دعم للشاشات الصغيرة */
        @media (max-width: 768px) {
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        }

        .apply-btn {
            background: var(--gradient-gold);
            color: var(--charcoal);
            border: none;
            padding: 12px 35px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .apply-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .clear-btn {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid var(--text-gray);
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
        }

        /* ===== PRODUCTS GRID ===== */
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .products-title {
            font-size: 2rem;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .results-count {
            background: rgba(212, 175, 55, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-gray);
            border: 1px solid var(--card-border);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-gold);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold-light);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .product-card:hover::before {
            transform: scaleX(1);
        }

        .product-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--gradient-gold);
            color: var(--charcoal);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 1;
        }

        .product-icon {
            font-size: 2.8rem;
            color: var(--gold-light);
            margin-bottom: 20px;
        }

        .product-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .product-category {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--gold-light);
            margin-bottom: 15px;
        }

        .product-description {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.8rem;
            color: var(--gold-light);
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .product-price span {
            font-size: 0.9rem;
            color: var(--text-gray);
            font-weight: normal;
        }

        /* ===== PRODUCT DETAIL PAGE ===== */
        .product-detail {
            min-height: 80vh;
            padding: 20px 0 50px;
        }

        .back-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-light);
            color: var(--gold-light);
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--gold-light);
            color: var(--charcoal);
        }

        .product-detail-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 50px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 50px;
        }

        .product-detail-icon {
            background: rgba(212, 175, 55, 0.05);
            border-radius: 40px;
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
        }

        .product-detail-icon i {
            font-size: 8rem;
            color: var(--gold-light);
        }

        .product-detail-info h1 {
            font-size: 2.5rem;
            color: var(--gold-light);
            margin-bottom: 20px;
        }

        .product-detail-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .product-detail-meta span {
            background: rgba(212, 175, 55, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            border: 1px solid var(--card-border);
        }

        .product-detail-price {
            font-size: 3rem;
            color: var(--gold-light);
            font-weight: 700;
            margin-bottom: 30px;
        }

        .product-detail-price span {
            font-size: 1.2rem;
            color: var(--text-gray);
        }

        .product-detail-description {
            color: var(--text-gray);
            margin-bottom: 30px;
            line-height: 1.9;
            font-size: 1.1rem;
        }

        .product-detail-features {
            list-style: none;
            margin-bottom: 35px;
        }

        .product-detail-features li {
            padding: 12px 0;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--card-border);
            font-size: 1.1rem;
        }

        .product-detail-features li i {
            color: var(--gold-light);
        }

        .book-now-btn {
            background: var(--gradient-gold);
            color: var(--charcoal);
            border: none;
            padding: 18px 45px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .book-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .share-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .share-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--card-border);
            color: var(--gold-light);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .share-btn:hover {
            background: var(--gold-light);
            color: var(--charcoal);
            transform: translateY(-3px);
        }

        .share-link-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 10px 15px;
            color: var(--text-light);
            width: 100%;
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* ===== MOBILE MENU ===== */
        .mobile-menu-toggle {
            display: none;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 10px 15px;
            color: var(--gold-light);
            font-size: 1.2rem;
            cursor: pointer;
            align-items: center;
            gap: 8px;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 380px;
            height: 100vh;
            background: var(--charcoal);
            border-left: 1px solid var(--gold-light);
            z-index: 1000;
            padding: 100px 25px 30px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .mobile-menu.active {
            right: 0;
        }

        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .mobile-menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .mobile-user-card {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-light);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .mobile-user-card i {
            font-size: 3rem;
            color: var(--gold-light);
            margin-bottom: 10px;
        }

        .mobile-user-name {
            font-size: 1.3rem;
            color: var(--gold-light);
            font-weight: 700;
        }

        .mobile-user-phone {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .mobile-login-btn,
        .mobile-logout-btn {
            width: 100%;
            padding: 15px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .mobile-login-btn {
            background: var(--gradient-gold);
            color: var(--charcoal);
            border: none;
        }

        .mobile-logout-btn {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* ===== MODALS ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            background: var(--charcoal);
            padding: 40px 30px;
            border-radius: 40px;
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--gold-light);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: var(--gold-light);
            font-size: 1.8rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .modal h2 {
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            color: var(--text-light);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--gold-light);
            outline: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: var(--gradient-gold);
            color: var(--charcoal);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {

/* تحسين الميتا داتا */
.product-detail-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
}

.product-detail-meta span {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
}

@media (max-width: 480px) {
    .product-detail-meta span {
        white-space: normal;
        text-align: center;
        flex: 1 1 auto;
        justify-content: center;
    }
}

/* تحسين للشاشات الأفقية في الهاتف */
@media (max-width: 896px) and (orientation: landscape) {
    .product-detail-container {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
    }

    .product-detail-icon {
        padding: 20px;
    }

    .product-detail-icon i {
        font-size: 4rem;
    }

    .product-detail-info h1 {
        font-size: 1.5rem;
    }

    .product-detail-price {
        font-size: 2rem;
    }

    .product-detail-features li {
        padding: 6px 0;
        font-size: 0.9rem;
    }

    .book-now-btn {
        padding: 10px 20px;
        font-size: 1rem;
    }
}

/* تحسين اللمس للأجهزة التي تعمل باللمس */
@media (hover: none) and (pointer: coarse) {
    .product-detail .back-btn:active,
    .product-detail .book-now-btn:active,
    .product-detail .share-btn:active {
        transform: scale(0.95);
        opacity: 0.8;
    }

    .share-link-input:active {
        background: rgba(212, 175, 55, 0.2);
    }
}

        // ===== FILTERS FUNCTIONS =====
        function populateFilters() {
            const categories = [...new Set(window.nablaProducts.map(p => p.category))];
            const types = [...new Set(window.nablaProducts.map(p => {
                const parts = p.category.split(' ');
                return parts.length > 1 ? parts[1] : p.category;
            }))];
            
            const categoryFilter = document.getElementById('categoryFilter');
            const typeFilter = document.getElementById('typeFilter');
            
            if (categoryFilter) {
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categoryFilter.appendChild(option);
                });
            }
            
            if (typeFilter) {
                types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeFilter.appendChild(option);
                });
            }
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('productsGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            if (productsToRender.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px;">
                        <i class="fas fa-box-open" style="font-size: 4rem; color: var(--gold-light); opacity: 0.5;"></i>

                        <p style="color: var(--text-gray);">جرب تصفية مختلفة</p>
                    </div>
                `;
                return;
            }
            
            productsToRender.forEach(product => {
                const card = document.createElement('a');
                card.href = `#/product/${product.id}`;
                card.className = 'product-card';
                
                card.innerHTML = `
                    ${product.badge ? `<div class="product-badge">${product.badge}</div>` : ''}
                    <div class="product-icon"><i class="${product.icon}"></i></div>
                    <h3>${product.name}</h3>

                    <p class="product-description">${product.description}</p>
                    <div class="product-price">
                        ${product.price}$<span> / ${product.period}</span>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function setupFiltersEvents() {
            const filtersToggle = document.getElementById('filtersToggle');
            const filtersPanel = document.getElementById('filtersPanel');
            
            if (filtersToggle) {
                filtersToggle.addEventListener('click', () => {
                    filtersToggle.classList.toggle('active');
                    filtersPanel.classList.toggle('active');
                });
            }
            
            document.getElementById('applyFiltersBtn')?.addEventListener('click', () => {
                applyFilters();
                if (window.innerWidth <= 768) {
                    filtersToggle?.classList.remove('active');
                    filtersPanel?.classList.remove('active');
                }
            });
            
            document.getElementById('clearFiltersBtn')?.addEventListener('click', () => {
                clearFilters();
                if (window.innerWidth <= 768) {
                    filtersToggle?.classList.remove('active');
                    filtersPanel?.classList.remove('active');
                }
            });
        }

        function applyFilters() {
            const category = document.getElementById('categoryFilter')?.value || 'all';
            const type = document.getElementById('typeFilter')?.value || 'all';
            const minPrice = parseFloat(document.getElementById('minPrice')?.value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice')?.value) || Infinity;
            
            filteredProducts = window.nablaProducts.filter(p => {
                if (category !== 'all' && p.category !== category) return false;
                
                const productType = p.category.split(' ').length > 1 ? p.category.split(' ')[1] : p.category;
                if (type !== 'all' && productType !== type) return false;
                
                if (p.price < minPrice) return false;
                if (p.price > maxPrice) return false;
                
                return true;
            });
            
            renderProducts(filteredProducts);
            const resultsCount = document.getElementById('resultsCount');
            if (resultsCount) {
                resultsCount.textContent = `${filteredProducts.length} منتج`;
            }
        }

        function clearFilters() {
            const categoryFilter = document.getElementById('categoryFilter');
            const typeFilter = document.getElementById('typeFilter');
            const minPrice = document.getElementById('minPrice');
            const maxPrice = document.getElementById('maxPrice');
            
            if (categoryFilter) categoryFilter.value = 'all';
            if (typeFilter) typeFilter.value = 'all';
            if (minPrice) minPrice.value = '';
            if (maxPrice) maxPrice.value = '';
            
            filteredProducts = [...window.nablaProducts];
            renderProducts(filteredProducts);
            
            const resultsCount = document.getElementById('resultsCount');
            if (resultsCount) {
                resultsCount.textContent = `${window.nablaProducts.length} منتج`;
            }
        }

async function handleBooking(e) {
    e.preventDefault();
    
    if (!currentUser || !currentProduct) return;
    
    // تغيير حالة الزر إلى تحميل
    const submitBtn = e.target.querySelector('.submit-btn');
    const originalText = submitBtn.innerHTML;
    submitBtn.classList.add('loading');
    submitBtn.innerHTML = '<i class="fas fa-spinner"></i> جاري المعالجة...';
    
    const notes = document.getElementById('bookingNotes').value;

    const message = `
🚀 **طلب جديد - متجر Nabla**

👤 **العميل:** ${currentUser.name}
📱 **الواتساب:** ${currentUser.whatsapp}
🛒 **المنتج:** ${currentProduct.name}
💰 **السعر:** ${currentProduct.price}$ ${currentProduct.period}
📝 **ملاحظات:** ${notes || 'لا توجد ملاحظات'}

🔗 **رابط التواصل المباشر:**
${whatsappLink}

⏰ ${new Date().toLocaleString('ar-SA')}
    `;

    try {
        const response = await fetch('https://nabla-store.vercel.app/api/send-telegram', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });
        
        // انتظر 3 ثواني كاملة لإكمال الأنميشن
        setTimeout(async () => {
            if (response.ok) {
                messageSystem.show('✅ تم إرسال طلبك بنجاح! سنتواصل معك قريباً', 'success');
                document.getElementById('bookingModal').classList.remove('active');
                
                // إعادة الزر لحالته الطبيعية
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = originalText;
            } else {
                messageSystem.show('❌ حدث خطأ، حاول مرة أخرى', 'error');
                
                // إعادة الزر لحالته الطبيعية
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = originalText;
            }
        }, 3000); // 3 ثواني
        
    } catch (error) {
        setTimeout(() => {
            messageSystem.show('❌ خطأ في الاتصال', 'error');
            
            // إعادة الزر لحالته الطبيعية
            submitBtn.classList.remove('loading');
            submitBtn.innerHTML = originalText;
        }, 3000);
    }
}

            const phoneRegex = /^[\+]?[0-9]{10,15}$/;
            if (!phoneRegex.test(whatsapp.replace(/\s/g, ''))) {
                messageSystem.show('رقم واتساب غير صحيح', 'error');
                return;
            }
            
            saveUser({ name, whatsapp });
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginForm').reset();
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            init3D();
            handleRouting();
            
            // Event listeners for navigation
            window.addEventListener('hashchange', handleRouting);
            
            document.getElementById('homeLink').addEventListener('click', (e) => {
                e.preventDefault();
                window.location.hash = '#/';
            });
            
            // Login buttons
            document.getElementById('desktopLoginBtn').addEventListener('click', openLoginModal);
            document.getElementById('mobileLoginBtn').addEventListener('click', () => {
                openLoginModal();
                document.getElementById('mobileMenu').classList.remove('active');
                document.getElementById('mobileMenuOverlay').classList.remove('active');
            });
            
            // Logout buttons
            document.getElementById('desktopLogoutBtn').addEventListener('click', logout);
            document.getElementById('mobileLogoutBtn').addEventListener('click', () => {
                logout();
                document.getElementById('mobileMenu').classList.remove('active');
                document.getElementById('mobileMenuOverlay').classList.remove('active');
            });
            
            // Forms
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('bookingForm').addEventListener('submit', handleBooking);
            
            // Modal closes
            document.getElementById('closeLoginModal').addEventListener('click', () => {
                document.getElementById('loginModal').classList.remove('active');
            });
            
            document.getElementById('closeBookingModal').addEventListener('click', () => {
                document.getElementById('bookingModal').classList.remove('active');
            });
            
            // Close modals on outside click
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            });
            
            // Mobile menu
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('mobileMenu').classList.add('active');
                document.getElementById('mobileMenuOverlay').classList.add('active');
            });
            
            document.getElementById('mobileMenuOverlay').addEventListener('click', () => {
                document.getElementById('mobileMenu').classList.remove('active');
                document.getElementById('mobileMenuOverlay').classList.remove('active');
            });
        });
    </script>
</body>
</html>
